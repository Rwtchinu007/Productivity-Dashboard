<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
  </head>
  <body>
    <div id="main">
        <!-- <nav></nav> -->
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="./img/todo.jpg" alt="">
                <h2>To do list</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="./img/goals.jpg" alt="">
                <h2>Daily Planner</h2>
            </div>
            <div class="moti elem" id="2">
                <img src="./img/moto.jpg" alt="">
                <h2>Motivation</h2>
            </div>
            <div class="pomo elem" id="3">
                <img src="./img/pomo.jpg" alt="">
                <h2>Pomodoro Timer</h2>
            </div>
            <div class="goals elem" id="4">
                <img src="./img/rocket.jpg" alt="">
                <h2>Daily Goals</h2>
            </div>

            <section class="fullElem">
                <button class="back"><i class="ri-close-large-line"></i></button>
                <h1>To-Do list</h1>
            </section>
            <section class="fullElem">
                <button class="back"><i class="ri-close-large-line"></i></button>
                <h1>Daily Planner</h1>
            </section>
            <section class="fullElem">
                <button class="back"><i class="ri-close-large-line"></i></button>
                <h1>Motivational Quote</h1>
            </section>
            <section class="fullElem">
                <button class="back"><i class="ri-close-large-line"></i></button>
                <h1>Pomodoro Timer</h1>
            </section>
            <section class="fullElem">
                <button class="back"><i class="ri-close-large-line"></i></button>
                <h1>Daily Goals</h1>
            </section>

        </section> 
    </div>
    <script src="script.js"></script>
  </body>
</html>
